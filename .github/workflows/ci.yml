name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check src/ api/ tests/

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --tb=short

  # Placeholder for later: a `dvc repro --dry` job that checks the pipeline
  # DAG is still valid needs DVC remote credentials configured as repo
  # secrets first (Settings -> Secrets and variables -> Actions). Not added
  # yet to avoid a CI job that fails for a credentials reason unrelated to
  # the actual code change.